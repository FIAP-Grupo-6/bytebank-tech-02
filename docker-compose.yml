version: '3.8'

# ─── ByteBank Multi-Zones ─────────────────────────────────────────────────
# host (3002) ── rewrites /transactions/* ──► transactions (3001)
#    │                                              │
#    └──────────────► api (3000) ◄─────────────────┘
#
# IMPORTANTE: NEXTAUTH_SECRET deve ser idêntico em host e transactions —
# é o que permite o SSO entre as zonas via cookie compartilhado.

services:
  api:
    build:
      context: ./api
      dockerfile: DockerFile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - bytebank-network

  transactions:
    build:
      context: ./apps/transactions
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://api:3000
      - NEXTAUTH_SECRET=bytebank-secret-troque-em-producao
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - bytebank-network

  host:
    build:
      context: ./apps/host
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3000
      # Rewrite server-side → usa o nome do serviço na rede Docker
      - TRANSACTIONS_URL=http://transactions:3001
      - NEXTAUTH_SECRET=bytebank-secret-troque-em-producao
      - NEXTAUTH_URL=http://localhost:3002
    depends_on:
      - api
      - transactions
    networks:
      - bytebank-network

networks:
  bytebank-network:
    driver: bridge
